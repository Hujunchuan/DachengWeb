<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="ai.title">AI - 止观 AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/modals.css">
    <style>
        .ai-shell {
            padding: 140px 0 100px;
        }

        .ai-layout {
            display: grid;
            grid-template-columns: minmax(0, 360px) minmax(0, 1fr);
            gap: var(--space-xl);
            align-items: start;
        }

        .ai-panel,
        .chat-panel {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            box-shadow: 0 16px 40px rgba(26, 26, 26, 0.04);
        }

        .ai-panel {
            padding: 40px 36px;
            position: sticky;
            top: 120px;
        }

        .ai-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 999px;
            background: rgba(92, 122, 107, 0.08);
            color: var(--accent-green);
            font-size: 13px;
            letter-spacing: 2px;
            margin-bottom: 24px;
        }

        .ai-title {
            font-size: 42px;
            line-height: 1.35;
            margin-bottom: 18px;
        }

        .ai-desc {
            color: var(--text-secondary);
            font-size: 16px;
            line-height: 1.9;
            margin-bottom: 24px;
        }

        .ai-note {
            padding: 18px 20px;
            border-radius: 16px;
            background: rgba(26, 26, 26, 0.03);
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 28px;
        }

        .ai-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .chat-panel {
            padding: 32px;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .chat-title {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .chat-desc {
            font-size: 14px;
            line-height: 1.8;
            color: var(--text-secondary);
            max-width: 560px;
        }

        .chat-status {
            min-width: 150px;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(92, 122, 107, 0.08);
            color: var(--accent-green);
            font-size: 13px;
            text-align: center;
        }

        .chat-window {
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 360px;
            max-height: 520px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .chat-message {
            max-width: 78%;
            padding: 16px 18px;
            border-radius: 18px;
            line-height: 1.8;
            font-size: 15px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .chat-message.assistant {
            align-self: flex-start;
            background: rgba(92, 122, 107, 0.08);
            border: 1px solid rgba(92, 122, 107, 0.12);
            color: var(--text-primary);
        }

        .chat-message.user {
            align-self: flex-end;
            background: var(--text-primary);
            color: var(--surface-color);
        }

        .chat-prompt-block {
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px dashed var(--border-color);
        }

        .chat-prompt-title {
            margin-bottom: 14px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .chat-prompts {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 22px;
        }

        .chat-prompt {
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            background: transparent;
            font-family: var(--font-serif);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .chat-prompt:hover {
            border-color: var(--accent-green);
            color: var(--accent-green);
            background: rgba(92, 122, 107, 0.05);
        }

        .chat-composer {
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            padding: 16px 18px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            background: rgba(250, 250, 248, 0.8);
            font-family: var(--font-serif);
            font-size: 15px;
            color: var(--text-primary);
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        .chat-disclaimer {
            margin-top: 14px;
            color: var(--text-light);
            font-size: 13px;
            line-height: 1.7;
        }

        @media (max-width: 980px) {
            .ai-layout {
                grid-template-columns: 1fr;
            }

            .ai-panel {
                position: static;
            }

            .chat-header {
                flex-direction: column;
            }
        }

        @media (max-width: 640px) {
            .ai-shell {
                padding-top: 120px;
            }

            .ai-panel,
            .chat-panel {
                padding: 24px;
            }

            .ai-title {
                font-size: 34px;
            }

            .chat-message {
                max-width: 100%;
            }

            .chat-composer {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="nav-trigger-area"></div>

    <nav class="navbar" style="background: rgba(246, 244, 237, 0.98);">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html" data-i18n="common.brand.zhiguan">止观 AI</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" data-i18n="common.nav.home">首 卷</a></li>
                <li><a href="content.html" class="active" data-i18n="common.nav.ai">AI</a></li>
                <li><a href="community.html" data-i18n="common.nav.community">社区</a></li>
                <li><a href="download.html" data-i18n="common.nav.download">下载</a></li>
                <li><a href="auth.html" data-i18n="common.nav.knowledge">知 识 库</a></li>
            </ul>
            <div class="nav-controls">
                <button type="button" title="切换语言" class="hover-ink" id="btnLang" data-lang-trigger data-i18n-title="common.ui.language">EN</button>
                <div style="width: 1px; height: 16px; background: var(--border-color); margin: 0 8px;"></div>
                <a href="auth.html" title="个人主页" class="hover-ink" style="font-family: var(--font-serif); font-size: 14px; display: flex; align-items: center; gap: 8px;">
                    <div style="width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--accent-green); display: flex; align-items: center; justify-content: center; color: var(--accent-green); font-family: var(--font-kai);">AI</div>
                    <span data-i18n="common.nav.account">居士</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="ai-shell">
        <div class="container ai-layout">
            <section class="ai-panel animate-slide-up">
                <div class="ai-badge" data-i18n="ai.badge">AI 共修原型</div>
                <h1 class="ai-title font-kai" data-i18n="ai.hero.title">与 AI 一起练习专注、观照与成长</h1>
                <p class="ai-desc" data-i18n="ai.hero.desc">当前页面是一个前端伪聊天原型，用来预演未来的共修体验。你可以通过预设问题或输入自己的想法，感受未来 AI 入口的对话方式。</p>
                <div class="ai-note" data-i18n="ai.hero.note">知识库不会直接公开展示，登录后才会开放相关内容与引用能力。</div>
                <div class="ai-actions">
                    <a class="btn-cta primary" href="auth.html" data-i18n="ai.hero.login">登录查看知识库</a>
                    <a class="btn-cta" href="community.html" data-i18n="ai.hero.community">去社区看看</a>
                </div>
            </section>

            <section class="chat-panel animate-fade-in">
                <div class="chat-header">
                    <div>
                        <h2 class="chat-title font-kai" data-i18n="ai.chat.title">共修对话窗口</h2>
                        <p class="chat-desc" data-i18n="ai.chat.desc">这里展示的是原型交互，不会发送真实请求，也不会保存对话。</p>
                    </div>
                    <div class="chat-status" data-i18n="ai.status">当前状态：可体验对话壳、预设回复与知识库入口逻辑。</div>
                </div>

                <div class="chat-window" id="chatWindow" aria-live="polite"></div>

                <div class="chat-prompt-block">
                    <div class="chat-prompt-title" data-i18n="ai.suggestions.title">可以从这些问题开始</div>
                    <div class="chat-prompts">
                        <button class="chat-prompt" type="button" data-prompt-key="calm" data-i18n="ai.suggestion.1">我总是很难安静下来</button>
                        <button class="chat-prompt" type="button" data-prompt-key="today" data-i18n="ai.suggestion.2">给我一个今天能开始的练习</button>
                        <button class="chat-prompt" type="button" data-prompt-key="five" data-i18n="ai.suggestion.3">如果只有 5 分钟，我能做什么？</button>
                        <button class="chat-prompt" type="button" data-prompt-key="knowledge" data-i18n="ai.suggestion.4">知识库为什么要登录后开放？</button>
                    </div>

                    <form class="chat-composer" id="chatComposer">
                        <input class="chat-input" id="chatInput" type="text" data-i18n-placeholder="ai.input.placeholder" placeholder="输入一个问题，体验原型对话..." autocomplete="off">
                        <button class="btn-cta primary" type="submit" data-i18n="ai.send">发送</button>
                    </form>
                    <p class="chat-disclaimer" data-i18n="ai.disclaimer">演示说明：当前仅为前端原型，不连接真实 AI、账号系统或知识库。</p>
                </div>
            </section>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const chatWindow = document.getElementById('chatWindow');
            const chatComposer = document.getElementById('chatComposer');
            const chatInput = document.getElementById('chatInput');
            const promptButtons = document.querySelectorAll('.chat-prompt');

            const chatCopy = {
                'zh-CN': {
                    starters: [
                        { role: 'assistant', text: '欢迎来到 AI 共修原型。你可以把这里当成未来入口的预演：先提问、再获得引导、最后回到自己的练习。' },
                        { role: 'assistant', text: '如果你还不知道从哪里开始，可以先点击下方的问题按钮。' },
                        { role: 'assistant', text: '知识库相关内容会在登录后开放，但当前也会先告诉你它将如何工作。' }
                    ],
                    prompts: {
                        calm: {
                            user: '我总是很难安静下来',
                            reply: '先不要急着追求“安静”。你可以从 3 分钟开始，只观察呼吸有没有变浅、肩膀有没有紧、注意力什么时候跑开。训练的第一步不是压住念头，而是看见它。'
                        },
                        today: {
                            user: '给我一个今天能开始的练习',
                            reply: '今天先做一个最小练习：找一个不会被打扰的地方，坐下 5 分钟，只做两件事：感觉呼吸，发现走神就回来。结束后写下一句观察。'
                        },
                        five: {
                            user: '如果只有 5 分钟，我能做什么？',
                            reply: '可以做一个 5 分钟版本：1 分钟安顿身体，3 分钟观察呼吸，1 分钟记录现在的状态。时间很短也没关系，稳定比强度更重要。'
                        },
                        knowledge: {
                            user: '知识库为什么要登录后开放？',
                            reply: '因为知识库未来不只是公开资料页，而是会与个人练习记录、引用内容和后续私有能力联动。当前原型先把入口逻辑收口到登录页。'
                        }
                    },
                    fallback: '这是一个演示原型，所以我现在会给出预置式回应：你的问题很适合进入“AI + 知识库 + 个人成长记录”的闭环，后续版本会把这些连接起来。'
                },
                en: {
                    starters: [
                        { role: 'assistant', text: 'Welcome to the AI practice prototype. Think of this as a preview of the future entry point: ask first, receive guidance, then return to your own practice.' },
                        { role: 'assistant', text: 'If you do not know where to begin, start with one of the suggested prompts below.' },
                        { role: 'assistant', text: 'The knowledge area will open after sign-in, but this prototype can already show how the flow is meant to work.' }
                    ],
                    prompts: {
                        calm: {
                            user: 'I cannot settle down at all',
                            reply: 'Do not chase perfect stillness yet. Start with three minutes and simply notice your breathing, your shoulders, and the moment your attention drifts. The first step is not suppression. It is noticing.'
                        },
                        today: {
                            user: 'Give me one practice I can do today',
                            reply: 'Try the smallest useful version today: sit somewhere quiet for five minutes, feel the breath, and each time you drift, return once. Then write down one sentence about what you noticed.'
                        },
                        five: {
                            user: 'What can I do if I only have 5 minutes?',
                            reply: 'Use a five-minute structure: 1 minute to settle the body, 3 minutes to watch the breath, and 1 minute to record your state. Short is fine. Consistency matters more than intensity.'
                        },
                        knowledge: {
                            user: 'Why is the knowledge area sign-in only?',
                            reply: 'Because the knowledge area is meant to connect with personal practice records, references, and later private features. In this prototype, the entry flow is already aligned through sign-in.'
                        }
                    },
                    fallback: 'This is only a prototype, so the reply is preset for now: your question fits the future loop of AI guidance, knowledge support, and personal growth records.'                }
            };

            const detectPromptKey = (value) => {
                const normalized = value.toLowerCase();
                if (normalized.includes('5')) return 'five';
                if (normalized.includes('安静') || normalized.includes('settle')) return 'calm';
                if (normalized.includes('今天') || normalized.includes('today')) return 'today';
                if (normalized.includes('知识库') || normalized.includes('knowledge')) return 'knowledge';
                return null;
            };

            const appendMessage = (role, text) => {
                const bubble = document.createElement('div');
                bubble.className = `chat-message ${role}`;
                bubble.textContent = text;
                chatWindow.appendChild(bubble);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            };

            const currentLang = () => {
                return localStorage.getItem('site-language') === 'en' ? 'en' : 'zh-CN';
            };

            const renderStarters = () => {
                chatWindow.innerHTML = '';
                chatCopy[currentLang()].starters.forEach((entry) => appendMessage(entry.role, entry.text));
            };

            const respond = (text, promptKey) => {
                const lang = currentLang();
                const pack = chatCopy[lang];
                const key = promptKey || detectPromptKey(text);

                appendMessage('user', text);
                window.setTimeout(() => {
                    if (key && pack.prompts[key]) {
                        appendMessage('assistant', pack.prompts[key].reply);
                    } else {
                        appendMessage('assistant', pack.fallback);
                    }
                }, 240);
            };

            promptButtons.forEach((button) => {
                button.addEventListener('click', () => {
                    const lang = currentLang();
                    const promptKey = button.dataset.promptKey;
                    const text = chatCopy[lang].prompts[promptKey].user;
                    respond(text, promptKey);
                });
            });

            chatComposer.addEventListener('submit', (event) => {
                event.preventDefault();
                const value = chatInput.value.trim();
                if (!value) return;
                respond(value);
                chatInput.value = '';
            });

            document.addEventListener('site:languagechange', () => {
                renderStarters();
            });

            renderStarters();
        });
    </script>
    <script src="js/site.js"></script>
</body>
</html>
